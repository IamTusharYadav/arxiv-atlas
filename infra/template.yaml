AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ArXiv Atlas query API - container Lambda, HTTP API, and the DynamoDB state tables.

Parameters:
  QdrantUrl:
    Type: String
    Description: Qdrant Cloud endpoint URL.
  QdrantApiKey:
    Type: String
    NoEcho: true
    Description: >
      Qdrant Cloud API key. Passed as a NoEcho parameter for a simple first deploy
  LangfusePublicKey:
    Type: String
    Default: ""
    Description: Langfuse public key (pk-lf-...). Empty leaves tracing off (fail-open no-op sink).
  LangfuseSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Langfuse secret key (sk-lf-...). NoEcho like the Qdrant key; empty disables tracing.
  LangfuseHost:
    Type: String
    Default: https://cloud.langfuse.com
    Description: Langfuse Cloud region base URL (EU default; use https://us.cloud.langfuse.com for US).
  OnnxDir:
    Type: String
    Default: /var/task/models
    Description: Where docker/Dockerfile.api bakes the INT8 model; read by the handler.
  AlertEmail:
    Type: String
    Default: ""
    Description: Email for alarm and budget notifications; leave empty to deploy without them.
  MonthlyBudgetUsd:
    Type: Number
    Default: 40
    Description: Monthly AWS spend cap; email alerts fire at $10, $25, and this amount.
  AllowedOrigin:
    Type: String
    Default: https://atlas.tusharyadav.dev
    Description: Origin allowed to call the API from a browser.

Globals:
  Function:
    # 900s for the async worker's multi-round loop.
    Timeout: 900
    MemorySize: 3008
    # avx512_vnni quantization (scripts/export_onnx.py) targets x86.
    Architectures:
      - x86_64

Conditions:
  HasEmail: !Not [!Equals [!Ref AlertEmail, ""]]

Resources:
  # One table per request-path guard; all keyed on `pk`, all reaped by DynamoDB TTL on
  # `expires_at`.
  BucketTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  CacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  BudgetTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # Async query jobs: POST enqueues here, a background invocation writes the result, GET polls.
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      # Anonymous browser client on the static host; no cookies, so no credentials to leak.
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
      # Coarse account-level backstop above the app's per-IP token bucket and budget guard.
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  QueryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: ..
      Dockerfile: docker/Dockerfile.api
      DockerTag: latest
    Properties:
      PackageType: Image
      # Every deploy publishes an immutable version and repoints this alias; the HttpApi event and
      # the worker's self-invoke both route through it, so rollback is an alias repoint (~30s,
      # `make rollback`) with no rebuild. SAM hangs the EventInvokeConfig below off the alias too.
      AutoPublishAlias: live
      Environment:
        Variables:
          QDRANT_URL: !Ref QdrantUrl
          QDRANT_API_KEY: !Ref QdrantApiKey
          ATLAS_ONNX_DIR: !Ref OnnxDir
          ATLAS_BUCKET_TABLE: !Ref BucketTable
          ATLAS_CACHE_TABLE: !Ref CacheTable
          ATLAS_BUDGET_TABLE: !Ref BudgetTable
          ATLAS_JOBS_TABLE: !Ref JobsTable
          # Read by _dispatch to self-invoke the alias rather than $LATEST.
          ATLAS_LAMBDA_ALIAS: live
          # Langfuse SDK reads these directly; an empty public key leaves the tracer a no-op.
          LANGFUSE_PUBLIC_KEY: !Ref LangfusePublicKey
          LANGFUSE_SECRET_KEY: !Ref LangfuseSecretKey
          LANGFUSE_HOST: !Ref LangfuseHost
          LOG_LEVEL: INFO
      # run_job catches its own business errors, so this only retries a hard worker crash/timeout.
      EventInvokeConfig:
        MaximumRetryAttempts: 1
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BucketTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CacheTable
        - DynamoDBCrudPolicy:
            TableName: !Ref BudgetTable
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        # Scope to the specific inference-profile ARNs once the account's are fixed.
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
        # Self-invoke for the async worker. Stack-name pattern avoids a GetAtt cycle on the role.
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*"
      # Split by method rather than ANY so no Lambda route matches OPTIONS. With CORS configured
      # and no OPTIONS route, API Gateway answers the preflight itself (204); ANY would route it
      # to FastAPI, which has no OPTIONS handler and 405s, failing every cross-origin POST.
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /{proxy+}
            Method: GET
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /{proxy+}
            Method: POST

  # Alarms notify through this topic; the email subscription is added only when AlertEmail is set.
  AlarmTopic:
    Type: AWS::SNS::Topic

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmail
    Properties:
      Protocol: email
      Endpoint: !Ref AlertEmail
      TopicArn: !Ref AlarmTopic

  # Hard worker crashes and request-path 500s; caught business errors never count as Lambda errors.
  FunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Query function errors elevated.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref QueryFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # Request-path latency only; the async worker runs as a separate invocation API Gateway never sees.
  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: API p95 latency high.
      Namespace: AWS/ApiGateway
      MetricName: Latency
      Dimensions:
        - Name: ApiId
          Value: !Ref Api
      ExtendedStatistic: p95
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # Outermost spend ring on top of the fail-closed in-app daily guard.
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Condition: HasEmail
    Properties:
      Budget:
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 10
            ThresholdType: ABSOLUTE_VALUE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 25
            ThresholdType: ABSOLUTE_VALUE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: !Ref MonthlyBudgetUsd
            ThresholdType: ABSOLUTE_VALUE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref AlertEmail

Outputs:
  ApiUrl:
    Description: Base URL of the query API.
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"
  FunctionName:
    Description: Generated function name; deploy.yml and `make rollback` repoint its alias.
    Value: !Ref QueryFunction
