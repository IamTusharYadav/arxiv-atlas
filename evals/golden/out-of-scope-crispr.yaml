rubric_notes: >
  The corpus is cs.AI, cs.LG, cs.CL abstracts; genome editing lives elsewhere on arXiv and
  beyond. The correct behavior is a clear statement that this is outside the corpus, ideally
  offering nearby on-corpus topics (for example ML for biology or protein models) if they
